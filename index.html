<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Unite HR Portal | Đăng nhập</title>
<meta content="#741f2b" name="theme-color"/>
<link href="./manifest.webmanifest" rel="manifest"/>
<link href="./css/app.css?v=37" rel="stylesheet"/><link href="./css/v35.css?v=37" rel="stylesheet"/>
</head>
<body class="auth-page">
<main class="auth-shell">
<section class="auth-card">
<div class="brand-badge">UNITE</div>
<h1>HR Portal</h1>
<p class="muted">Cổng thông tin nhân sự, lịch làm, thông báo và yêu cầu nội bộ Unite Group.</p>
<form class="form-stack" id="loginForm" novalidate="" onsubmit="return window.UWSLogin ? window.UWSLogin(event) : false;">
<label>
          Email
          <input autocomplete="email" id="email" name="email" placeholder="Nhập email đăng nhập" required="" type="email"/>
</label>
<label>
          Mật khẩu
          <input autocomplete="current-password" id="password" name="password" placeholder="Nhập mật khẩu" required="" type="password"/>
</label>
<button class="btn primary" id="loginBtn" type="submit">Đăng nhập</button>
<p aria-live="polite" class="message" id="loginMessage"></p>
</form>
<div class="hint-box">
<b>Ghi chú:</b> Tài khoản được tạo và phân quyền theo Khu vực → Chi nhánh → Team.
      </div>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js?v=35"></script>
<script src="./js/auth.js?v=35"></script>
</body>
</html>
