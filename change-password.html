<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<meta content="#741f2b" name="theme-color"/>
<title>Đổi mật khẩu lần đầu | Unite HR</title>
<link href="./css/app.css?v=35" rel="stylesheet"/><link href="./css/v35.css?v=35" rel="stylesheet"/>
</head>
<body class="auth-page first-password-page">
<main class="auth-shell">
<section class="auth-card first-password-card">
<div class="brand-badge">UNITE</div>
<p class="eyebrow">Bảo mật tài khoản</p>
<h1>Đổi mật khẩu lần đầu</h1>
<p class="muted">Tài khoản đang dùng mật khẩu tạm. Bạn cần đặt mật khẩu riêng trước khi vào hệ thống.</p>
<form class="form-stack" id="firstPasswordForm">
<label>Mật khẩu mới<input autocomplete="new-password" id="firstPassword" minlength="8" placeholder="Tối thiểu 8 ký tự" required="" type="password"/></label>
<label>Nhập lại mật khẩu<input autocomplete="new-password" id="firstPasswordConfirm" minlength="8" placeholder="Nhập lại mật khẩu mới" required="" type="password"/></label>
<button class="btn primary" id="firstPasswordSubmit" type="submit">Cập nhật mật khẩu</button>
<p aria-live="polite" class="message" id="firstPasswordMessage"></p>
</form>
<div class="hint-box"><b>Lưu ý:</b> Không tiếp tục dùng mật khẩu mặc định 12345678.</div>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js?v=35"></script>
<script src="./js/first-password.js?v=35"></script>
</body>
</html>
