<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#741f2b" />
  <title>Đổi mật khẩu lần đầu | Unite HR</title>
  <link rel="stylesheet" href="./css/app.css?v=31" />
</head>
<body class="auth-page first-password-page">
  <main class="auth-shell">
    <section class="auth-card first-password-card">
      <div class="brand-badge">UNITE</div>
      <p class="eyebrow">Bảo mật tài khoản</p>
      <h1>Đổi mật khẩu lần đầu</h1>
      <p class="muted">Tài khoản đang dùng mật khẩu tạm. Bạn cần đặt mật khẩu riêng trước khi vào hệ thống.</p>
      <form id="firstPasswordForm" class="form-stack">
        <label>Mật khẩu mới<input id="firstPassword" type="password" minlength="8" autocomplete="new-password" placeholder="Tối thiểu 8 ký tự" required /></label>
        <label>Nhập lại mật khẩu<input id="firstPasswordConfirm" type="password" minlength="8" autocomplete="new-password" placeholder="Nhập lại mật khẩu mới" required /></label>
        <button id="firstPasswordSubmit" class="btn primary" type="submit">Cập nhật mật khẩu</button>
        <p id="firstPasswordMessage" class="message" aria-live="polite"></p>
      </form>
      <div class="hint-box"><b>Lưu ý:</b> Không tiếp tục dùng mật khẩu mặc định 12345678.</div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js?v=31"></script>
  <script src="./js/first-password.js?v=31"></script>
</body>
</html>
